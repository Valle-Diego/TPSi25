<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anagrafica CSV</title>
  <link rel="stylesheet" href="stile.css">
</head>
<body>

  <header>
    <h1>Anagrafica</h1>
  </header>

  <main>

    <section id="upload-section">
      <label for="file-input">Importa file CSV:</label>
      <input type="file" id="file-input" accept=".csv">
      <p id="upload-hint">Separatore supportato: <code>,</code> oppure <code>;</code></p>
    </section>

    <section id="controls" style="display:none;">
      <input type="text" id="search" placeholder="Cerca…" oninput="renderGrid()">
      <select id="sort-select" onchange="renderGrid()">
        <option value="">Ordina per…</option>
      </select>
      <span id="counter"></span>
      <button onclick="resetAll()">Reset</button>
    </section>

    <section id="grid"></section>

    <p id="message" style="display:none;"></p>

  </main>

  <script>
    let records = [];
    let headers = [];

    // Gestione selezione file
    document.getElementById('file-input').addEventListener('change', function(e) {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) { parseCSV(e.target.result); };
      reader.readAsText(file, 'UTF-8');
    }

    // Parser CSV con rilevamento automatico del separatore
    function parseCSV(text) {
      const firstLine = text.split('\n')[0];
      const sep = firstLine.includes(';') ? ';' : ',';
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

      if (lines.length < 2) {
        showMessage('Il file CSV non contiene dati sufficienti.');
        return;
      }

      headers = parseLine(lines[0], sep);
      records = [];

      // Costruzione ricorsiva dei record
      function processLine(index) {
        if (index >= lines.length) {
          finalise();
          return;
        }
        const values = parseLine(lines[index], sep);
        const obj = {};
        headers.forEach(function(h, i) {
          obj[h] = values[i] !== undefined ? values[i] : '';
        });
        records.push(obj);
        processLine(index + 1);
      }

      processLine(1);
    }

    // Parsing di una singola riga (gestisce campi tra virgolette)
    function parseLine(line, sep) {
      const result = [];
      let field = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          inQuotes = !inQuotes;
        } else if (ch === sep && !inQuotes) {
          result.push(field.trim());
          field = '';
        } else {
          field += ch;
        }
      }
      result.push(field.trim());
      return result;
    }

    // Dopo il parsing: popola il select e mostra la griglia
    function finalise() {
      if (records.length === 0) {
        showMessage('Nessun record trovato nel file.');
        return;
      }

      const sel = document.getElementById('sort-select');
      sel.innerHTML = '<option value="">Ordina per…</option>';
      headers.forEach(function(h) {
        const opt = document.createElement('option');
        opt.value = h;
        opt.textContent = h;
        sel.appendChild(opt);
      });

      document.getElementById('upload-section').style.display = 'none';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('message').style.display = 'none';
      renderGrid();
    }

    // Rendering della griglia (con filtro e ordinamento)
    function renderGrid() {
      const query  = document.getElementById('search').value.toLowerCase();
      const sortBy = document.getElementById('sort-select').value;

      let data = records.filter(function(r) {
        return Object.values(r).some(function(v) {
          return v.toLowerCase().includes(query);
        });
      });

      if (sortBy) {
        data = data.slice().sort(function(a, b) {
          return (a[sortBy] || '').localeCompare(b[sortBy] || '', 'it');
        });
      }

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (data.length === 0) {
        showMessage('Nessun risultato trovato.');
        return;
      }

      document.getElementById('message').style.display = 'none';

      // Creazione ricorsiva delle card
      function buildCards(index) {
        if (index >= data.length) return;
        grid.appendChild(createCard(data[index]));
        buildCards(index + 1);
      }

      buildCards(0);
      document.getElementById('counter').textContent = data.length + ' record';
    }

    // Crea una singola card
    function createCard(record) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = buildFields(Object.keys(record), record, 0, '');
      return card;
    }

    // Costruzione ricorsiva dei campi della card
    function buildFields(keys, record, index, html) {
      if (index >= keys.length) return html;
      const k = keys[index];
      const v = record[k];
      const row = '<div class="field">'
        + '<span class="label">' + esc(k) + '</span>'
        + '<span class="value">' + (v ? esc(v) : '—') + '</span>'
        + '</div>';
      return buildFields(keys, record, index + 1, html + row);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    function showMessage(msg) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('grid').innerHTML = '';
    }

    function resetAll() {
      records = [];
      headers = [];
      document.getElementById('upload-section').style.display = 'block';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('grid').innerHTML = '';
      document.getElementById('message').style.display = 'none';
      document.getElementById('file-input').value = '';
      document.getElementById('search').value = '';
    }
  </script>

</body>
</html>
