<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
      </div>
      <span class="logo-text">Contacts</span>
    </div>
    <div class="header-actions">
      <button class="btn" id="add-more-btn" style="display:none" onclick="document.getElementById('file-input-hidden').click()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
        Add CSV
      </button>
      <button class="btn btn-danger" id="clear-all-btn" style="display:none" onclick="clearAll()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/></svg>
        Reset
      </button>
    </div>
  </header>

  <main>

    <!-- Drop zone -->
    <div id="drop-zone" onclick="document.getElementById('file-input-hidden').click()">
      <div class="drop-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-title">Drag your CSV files here</div>
      <div class="drop-sub">or click to browse — separators <code>,</code> and <code>;</code> supported</div>
      <input type="file" id="file-input-hidden" accept=".csv" multiple>
    </div>

    <!-- Source chips -->
    <div id="sources-bar"></div>

    <!-- Merge bar -->
    <div id="merge-bar">
      <div class="merge-info" id="merge-info"></div>
      <button class="btn btn-accent" onclick="exportMerged()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14l4-10 4 10M6 10h4"/></svg>
        Export merged CSV
      </button>
    </div>

    <!-- Controls -->
    <div id="controls" style="display:none">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5l3 3"/>
        </svg>
        <input type="text" id="search" placeholder="Search all fields…" oninput="renderGrid()">
      </div>
      <div class="sort-wrap">
        <span class="sort-label">sort by</span>
        <select id="sort-select" onchange="renderGrid()"><option value="">—</option></select>
        <button id="sort-dir" class="asc" onclick="toggleSortDir()" title="Reverse order"></button>
      </div>
      <div class="controls-right">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-grid" title="Grid" onclick="setView('grid')">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
              <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
            </svg>
          </button>
          <button class="view-btn" id="btn-list" title="List" onclick="setView('list')">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/>
            </svg>
          </button>
        </div>
        <span id="counter"></span>
      </div>
    </div>

    <!-- Grid -->
    <div id="grid"></div>

    <!-- Empty state -->
    <div id="empty-state" style="display:none" class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <h3>No results found</h3>
      <p>Try adjusting your search or sort filter</p>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="script.js"></script>

<footer>
    <a class="back-btn" href="/Secret/secret.html">← back to the hub</a>
    <span>// Diego Valle · private area</span>
  </footer>

</body>
</html>
